AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Backlog Ticket Bot - メール・Slackから自動起票

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs22.x
    MemorySize: 256
    Environment:
      Variables:
        BACKLOG_SPACE_ID: !Ref BacklogSpaceId
        BACKLOG_API_KEY: !Ref BacklogApiKey
        BACKLOG_PROJECT_ID: !Ref BacklogProjectId
        BACKLOG_ISSUE_TYPE_ID: !Ref BacklogIssueTypeId
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        SLACK_BOT_TOKEN: !Ref SlackBotToken
        SLACK_SIGNING_SECRET: !Ref SlackSigningSecret

Parameters:
  BacklogSpaceId:
    Type: String
    Default: axon
    Description: Backlog スペースID
  BacklogApiKey:
    Type: String
    NoEcho: true
    Description: Backlog API キー
  BacklogProjectId:
    Type: String
    Default: "761638"
    Description: Backlog プロジェクトID
  BacklogIssueTypeId:
    Type: String
    Default: "4071592"
    Description: Backlog 課題種別ID (デフォルト: タスク)
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API キー
  SlackBotToken:
    Type: String
    NoEcho: true
    Description: Slack Bot Token (xoxb-...)
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: Slack Signing Secret

Resources:
  EmailHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/email.handler
      Description: SESメール受信 → Backlog起票
      Environment:
        Variables:
          EMAIL_BUCKET_NAME: !Ref EmailBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref EmailBucket

  SlackHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/slack.handler
      Description: Slackメンション → Backlog起票
      Events:
        SlackApi:
          Type: Api
          Properties:
            Path: /slack/events
            Method: post

  EmailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-emails"

  EmailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EmailBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${EmailBucket}/*"

  # SES Receipt Rule は us-east-1 に CLI で作成済み (backlog-ticket-bot-ruleset)
  # デプロイ後、EmailHandlerFunction の ARN を使って Receipt Rule を更新する
  SESLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmailHandlerFunction
      Action: lambda:InvokeFunction
      Principal: ses.amazonaws.com

Outputs:
  SlackWebhookUrl:
    Description: SlackアプリのRequest URLに設定
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/slack/events"
  EmailBucketName:
    Description: SESがメールを保存するS3バケット名
    Value: !Ref EmailBucket
  EmailHandlerFunctionArn:
    Description: SES Receipt Rule に設定する Lambda ARN
    Value: !GetAtt EmailHandlerFunction.Arn
  EmailAddress:
    Description: 起票用メールアドレス
    Value: ticket@ticket.yokoyama-lab.jp
